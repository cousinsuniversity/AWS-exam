<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AWS Certified Cloud Practitioner | Assessment</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="main-header">
        <div class="logo-section">
            <span class="course-code">AWS CLF-C02</span>
            <span class="divider">|</span>
            <span class="exam-title">Certified Cloud Practitioner Retake</span>
        </div>
        <div class="timer-section">
            <span class="timer-label">Time Remaining:</span>
            <span id="timer">90:00</span>
        </div>
        <button id="submit-exam-btn" class="btn-primary">Submit Exam</button>
    </header>

    <main class="exam-container">
        <aside class="exam-sidebar">
            <h3>Question Map</h3>
            <div id="question-map" class="map-grid"></div>
            <div class="legend">
                <span class="legend-item"><span class="dot answered"></span> Answered</span>
                <span class="legend-item"><span class="dot flagged"></span> Flagged</span>
            </div>
        </aside>

        <section class="question-workspace" id="quiz-content">
            <div class="question-header">
                <span id="domain-label" class="domain-tag"></span>
                <button id="flag-btn" class="btn-flag">Flag for Review</button>
            </div>
            
            <div class="question-body">
                <h2 id="question-number"></h2>
                <p id="question-text" class="question-prompt"></p>
                <div id="options-container" class="options-list"></div>
            </div>

            <footer class="workspace-footer">
                <button id="prev-btn" class="btn-secondary">Previous</button>
                <div class="progress-info">Progress: <span id="progress-text">0/65</span></div>
                <button id="next-btn" class="btn-secondary">Next</button>
            </footer>
        </section>

        <section id="results-screen" class="results-container hidden">
            <div class="results-card">
                <h1>Assessment Complete</h1>
                <div class="score-circle"><span id="final-score-percent">0%</span></div>
                <p id="pass-fail-msg"></p>
                <div class="domain-breakdown">
                    <h3>Performance Breakdown</h3>
                    <div id="domain-stats"></div>
                </div>
                <button onclick="window.location.reload()" class="btn-primary">Retake Exam</button>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
